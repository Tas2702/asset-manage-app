{% extends 'standard.html' %}

{% block title %}Add Department — Asset Manager{% endblock %}

{% block content %}
<h1>Add Department</h1>

<form method="POST" action="{{ url_for('departments.add') }}">

    <div>
        <label for="name">Department Name</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div>
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="e.g. Floor 2 - East Wing" required>
    </div>

    <button type="submit">Add Department</button>
</form>

<a href="{{ url_for('departments.index') }}">Back to Departments</a>

{% endblock %}
