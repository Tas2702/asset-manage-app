{% extends 'standard.html' %}

{% block title %}Edit {{ user['username'] }} — Asset Manager{% endblock %}

{% block content %}
<h1>Edit {{ user['username'] }}</h1>

<form method="POST" action="{{ url_for('users.edit', user_id=user['user_id']) }}">

    <div>
        <label for="username">Username</label>
        <!-- value= pre-fills the field with the user's current data -->
        <input type="text" id="username" name="username" value="{{ user['username'] }}" required>
    </div>

    <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user['email'] }}" required>
    </div>

    <div>
        <label for="password">Password</label>
        <!-- Leave blank to keep the existing password unchanged -->
        <input type="password" id="password" name="password" placeholder="Leave blank to keep current password">
    </div>

    <!-- selected= highlights the user's current role in the dropdown -->
    <div>
        <label for="role">Role</label>
        <select id="role" name="role" required>
            <option value="user" {% if user['role'] == 'user' %}selected{% endif %}>User</option>
            <option value="admin" {% if user['role'] == 'admin' %}selected{% endif %}>Admin</option>
        </select>
    </div>

    <!-- selected= highlights the user's current department in the dropdown -->
    <div>
        <label for="department_id">Department</label>
        <select id="department_id" name="department_id">
            <option value="" {% if not user['department_id'] %}selected{% endif %}>No Department</option>
            {% for department in departments %}
            <option value="{{ department['department_id'] }}" {% if user['department_id'] == department['department_id'] %}selected{% endif %}>
                {{ department['name'] }}
            </option>
            {% endfor %}
        </select>
    </div>

    <button type="submit">Save Changes</button>
</form>

<a href="{{ url_for('users.view', user_id=user['user_id']) }}">Cancel</a>

{% endblock %}
